name: Deploy to Azure Container Apps
description: Deploy new revision to Azure Container Apps and wait for activation
inputs:
  image_tag:
    description: Container image tag to deploy
    required: true
  environment:
    description: Target environment (dev/staging/prod)
    required: true
  service_name:
    description: Service name
    required: true
  aca_name:
    description: Azure Container App name
    required: true
  aca_resource_group:
    description: Azure resource group
    required: true
runs:
  using: composite
  steps:
  - name: Deploy new revision
    shell: bash
    run: "az containerapp update \\\n  --name ${{ inputs.aca_name }}-${{ inputs.environment\
      \ }} \\\n  --resource-group ${{ inputs.aca_resource_group }} \\\n  --image ${{\
      \ inputs.image_tag }}"
  - name: Wait for revision activation
    shell: bash
    run: "az containerapp revision list \\\n  --name ${{ inputs.aca_name }}-${{ inputs.environment\
      \ }} \\\n  --resource-group ${{ inputs.aca_resource_group }} \\\n  --query \"\
      [0].properties.runningState\" -o tsv | \\\n  grep -q 'Running'"
