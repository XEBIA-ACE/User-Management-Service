name: CD Deploy (Reusable)
'on':
  workflow_call:
    inputs:
      image_sha:
        description: Full commit SHA whose CI-built images should be deployed
        required: true
        type: string
      health_check_url:
        description: External health check URL. Empty = derive from Ingress/LoadBalancer
          endpoint.
        required: false
        type: string
        default: ''
      health_check_timeout:
        description: Health check timeout in seconds
        required: false
        type: number
        default: 300
      azure_client_id:
        description: Azure AD application client ID
        required: true
        type: string
      azure_tenant_id:
        description: Azure AD tenant ID
        required: true
        type: string
      azure_subscription_id:
        description: Azure subscription ID
        required: true
        type: string
      aca_name:
        description: Azure Container App name
        required: true
        type: string
      aca_resource_group:
        description: Azure resource group
        required: true
        type: string
permissions:
  id-token: write
  contents: read
jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: dev
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with: &id001
        client-id: ${{ inputs.azure_client_id }}
        tenant-id: ${{ inputs.azure_tenant_id }}
        subscription-id: ${{ inputs.azure_subscription_id }}
    - name: Deploy to aca (dev)
      uses: ./.github/actions/deploy-aca
      with:
        image_tag: ${{ inputs.image_sha }}
        environment: dev
        aca_name: ${{ inputs.aca_name }}
        aca_resource_group: ${{ inputs.aca_resource_group }}
    - name: Health check (dev)
      run: "timeout ${{ inputs.health_check_timeout || 300 }} bash -c '\n  until curl\
        \ -sf ${{ inputs.health_check_url }}; do\n    sleep 10\n  done\n'"
    - name: Auto-rollback on failure (dev)
      if: failure()
      run: 'echo "Health check failed for dev, initiating rollback"

        # Rollback to previous stable version'
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    needs:
    - deploy-dev
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with: *id001
    - name: Deploy to aca (staging)
      uses: ./.github/actions/deploy-aca
      with:
        image_tag: ${{ inputs.image_sha }}
        environment: staging
        aca_name: ${{ inputs.aca_name }}
        aca_resource_group: ${{ inputs.aca_resource_group }}
    - name: Health check (staging)
      run: "timeout ${{ inputs.health_check_timeout || 300 }} bash -c '\n  until curl\
        \ -sf ${{ inputs.health_check_url }}; do\n    sleep 10\n  done\n'"
    - name: Auto-rollback on failure (staging)
      if: failure()
      run: 'echo "Health check failed for staging, initiating rollback"

        # Rollback to previous stable version'
  deploy-prod:
    runs-on: ubuntu-latest
    environment: prod
    needs:
    - deploy-staging
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with: *id001
    - name: Deploy to aca (prod)
      uses: ./.github/actions/deploy-aca
      with:
        image_tag: ${{ inputs.image_sha }}
        environment: prod
        aca_name: ${{ inputs.aca_name }}
        aca_resource_group: ${{ inputs.aca_resource_group }}
    - name: Health check (prod)
      run: "timeout ${{ inputs.health_check_timeout || 300 }} bash -c '\n  until curl\
        \ -sf ${{ inputs.health_check_url }}; do\n    sleep 10\n  done\n'"
    - name: Auto-rollback on failure (prod)
      if: failure()
      run: 'echo "Health check failed for prod, initiating rollback"

        # Rollback to previous stable version'
