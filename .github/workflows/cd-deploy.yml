name: CD Deploy
'on':
  workflow_run:
    workflows:
    - CI Build
    types:
    - completed
    branches:
    - main
    - develop
  workflow_dispatch: {}
permissions:
  id-token: write
  contents: read
jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name
      == 'workflow_dispatch' }}
    uses: ./.github/workflows/cd-deploy-reusable.yml
    with:
      image_sha: ${{ github.event.workflow_run.head_sha || github.sha }}
      health_check_url: ${{ vars.HEALTH_CHECK_URL }}
      azure_client_id: ${{ secrets.AZURE_CLIENT_ID }}
      azure_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
      azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      aca_name: ${{ vars.ACA_NAME }}
      aca_resource_group: ${{ vars.ACA_RESOURCE_GROUP }}
    secrets: inherit
