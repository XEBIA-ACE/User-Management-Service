name: CI Build (Reusable)
'on':
  workflow_call:
    inputs:
      services:
        description: "JSON list of services: [{name, build_context, dockerfile, image}] \u2014 `image` is the ECR repository\
          \ name"
        required: true
        type: string
      ecr_registry:
        description: Container registry host. Empty = build only, no push.
        required: false
        type: string
        default: ''
      aws_region:
        description: AWS region of the ECR registry
        required: false
        type: string
        default: us-east-1
      build_args:
        description: Additional Docker build arguments
        required: false
        type: string
        default: ''
permissions:
  contents: read
  pull-requests: read
  packages: write
  id-token: write
  security-events: write
jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_changes: ${{ steps.matrix.outputs.matrix != '[]' }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Detect changes
      id: changes
      if: github.event_name == 'pull_request'
      uses: dorny/paths-filter@v3
      with:
        filters: 'app:

          - app/**

          '
    - name: Resolve service matrix
      id: matrix
      env:
        SERVICES: ${{ inputs.services }}
        CHANGED: ${{ steps.changes.outputs.changes || '[]' }}
      run: "if [ \"${{ github.event_name }}\" = \"push\" ]; then\n  echo \"matrix=$(echo \"$SERVICES\" | jq -c .)\" >> \"\
        $GITHUB_OUTPUT\"\nelse\n  echo \"matrix=$(echo \"$SERVICES\" | jq -c --argjson changed \\\"$CHANGED\\\" '[.[] | select(.name\
        \ as \\$n | \\$changed | index(\\$n))]')\" >> \"$GITHUB_OUTPUT\"\nfi"
  lint:
    runs-on: ubuntu-latest
    needs:
    - detect-changes
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
        cache: maven
    - name: Lint
      run: if [ -x ./mvnw ]; then ./mvnw -B -ntp compile; else mvn -B -ntp compile; fi
    if: ${{ needs.detect-changes.outputs.has_changes == 'true' }}
  test:
    runs-on: ubuntu-latest
    needs:
    - lint
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
        cache: maven
    - name: Run tests
      run: if [ -x ./mvnw ]; then ./mvnw -B -ntp verify; else mvn -B -ntp verify; fi
  build:
    runs-on: ubuntu-latest
    needs:
    - test
    - detect-changes
    if: ${{ needs.detect-changes.outputs.has_changes == 'true' }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver-opts: image=moby/buildkit:latest
    - name: Build image
      id: build
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.service.build_context || '.' }}
        file: ${{ matrix.service.build_context || '.' }}/${{ matrix.service.dockerfile || 'Dockerfile' }}
        push: false
        load: true
        tags: local/${{ matrix.service.name }}:${{ github.sha }}
        cache-from: type=gha,scope=${{ matrix.service.name }}
        cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
  scan:
    runs-on: ubuntu-latest
    needs:
    - build
    - detect-changes
    if: ${{ needs.detect-changes.outputs.has_changes == 'true' }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build image for scanning
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.service.build_context || '.' }}
        file: ${{ matrix.service.build_context || '.' }}/${{ matrix.service.dockerfile || 'Dockerfile' }}
        push: false
        load: true
        tags: ci-scan-${{ matrix.service.name }}:${{ github.sha }}
        cache-from: type=gha,scope=${{ matrix.service.name }}
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@v0.36.0
      with:
        image-ref: ci-scan-${{ matrix.service.name }}:${{ github.sha }}
        format: sarif
        output: trivy-results.sarif
        severity: CRITICAL,HIGH
        ignore-unfixed: 'true'
        exit-code: '0'
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: trivy-results.sarif
        category: trivy-${{ matrix.service.name }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
  push:
    runs-on: ubuntu-latest
    needs:
    - scan
    - detect-changes
    if: ${{ needs.detect-changes.outputs.has_changes == 'true' && inputs.ecr_registry != '' && github.event_name == 'push'
      }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Compute image tag
      id: tag
      run: echo "tag=sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"
    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ inputs.aws_region }}
    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.service.build_context || '.' }}
        file: ${{ matrix.service.build_context || '.' }}/${{ matrix.service.dockerfile || 'Dockerfile' }}
        push: true
        tags: ${{ inputs.ecr_registry }}/${{ matrix.service.image }}:${{ steps.tag.outputs.tag }}
        cache-from: type=gha,scope=${{ matrix.service.name }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
      fail-fast: false
